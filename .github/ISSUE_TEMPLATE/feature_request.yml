name: Feature request
description: Suggest an improvement or a new tool
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that isn't possible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Name the server/tool if relevant. Note that these servers are intentionally read-only.
    validations:
      required: true
